# SonarQube project configuration

sonar.projectKey=nwg-common
sonar.projectName=nwg-common
sonar.projectVersion=0.3.0

# Source code location — standalone repo has src/ at root (not crates/*/src/)
sonar.sources=src

# Test sources must be set BEFORE sonar.test.inclusions — the inclusion
# pattern filters files within this scope. Leaving it undefined silently
# produces incomplete test classification. Listing both `src` and `tests`
# here means the pattern catches inline `#[cfg(test)] mod tests` in lib
# sources AND any future top-level Cargo integration-test dir, without
# either path needing to exist today.
sonar.tests=src,tests

# Rust source files
sonar.inclusions=**/*.rs

# Exclude non-source files
sonar.exclusions=**/target/**

# Test file pattern — any file under a tests/ directory at any depth.
# Combined with sonar.tests=src,tests, this matches inline
# `src/**/tests/**` AND a top-level `tests/` if either appears.
sonar.test.inclusions=**/tests/**

# Encoding
sonar.sourceEncoding=UTF-8
